name: echats_flutter
description: A new modern Flutter project for Echats.
publish_to: 'none'
version: 1.0.5+5

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  async: ^2.11.0
  
  # State Management & Routing
  flutter_riverpod: ^2.4.9
  go_router: ^12.1.1
  
  # Backend & Realtime
  supabase_flutter: ^2.4.0
  flutter_dotenv: ^5.1.0
  flutter_secure_storage: ^9.0.0
  
  # Data Modeling
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  
  # UI & Design
  google_fonts: ^6.2.1
  lucide_icons: ^0.257.0
  cached_network_image: ^3.3.1
  flutter_slidable: ^3.0.1
  shimmer: ^3.0.0
  badges: ^3.1.2
  flutter_spinkit: ^5.2.1
  visibility_detector: ^0.4.0+2
  
  # Media 
  video_player: ^2.8.1
  chewie: ^1.7.1
  camera: ^0.11.0+2
  image_picker: ^1.0.7
  file_picker: ^8.0.0+1
  audioplayers: ^5.2.1
  record: 5.0.4
  
  # Charts & Stats
  fl_chart: ^0.66.2
  
  # Utils
  glass_kit: ^3.0.0
  path_provider: ^2.1.2
  permission_handler: ^11.3.0
  intl: ^0.19.0
  share_plus: ^7.2.2
  package_info_plus: ^5.0.1
  uuid: ^4.3.3
  http: ^1.2.0
  flutter_markdown: ^0.6.18+2
  flutter_webrtc: ^0.9.48+hotfix.1
  qr_flutter: ^4.1.0
  timeago: ^3.6.1
  shared_preferences: ^2.2.3
  flutter_animate: ^4.5.2
  
  # Firebase & Notifications
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.10
  flutter_local_notifications: ^17.2.2
  
  # Connectivity
  connectivity_plus: ^5.0.2

dependency_overrides:
  record_platform_interface: 1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/sounds/
    - .env
